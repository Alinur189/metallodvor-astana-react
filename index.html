    <div id="root"></div>
    <script>
      (function (l) {
        if (l.search[1] === 'p') {
          var params = l.search.slice(1).split('&').reduce(function (p, s) {
            var r = s.split('=');
            p[r[0]] = r.slice(1).join('=').replace(/~and~/g, '&');
            return p;
          }, {});
          window.history.replaceState(
            null, null,
            l.pathname.slice(0, -1) + (params.p ? '/' + params.p : '') +
            (params.q ? '?' + params.q : '') + l.hash
          );
        }
      }(window.location));
